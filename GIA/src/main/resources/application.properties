
spring.application.name=GIA
logging.level.org.springframework.boot.context.config=DEBUG
#spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
#spring.datasource.url=jdbc:postgresql://my-postgres:5432/postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?sslmode=disable
spring.datasource.username=alem
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=20

stripe.api.key=${STRIPE_SECRET_KEY}

stripe.public.key=${STRIPE_PUBLIC_KEY}


management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
# Set logging level for your package
logging.level.com.alem.GIA.security=DEBUG

# Limit Spring Security logging if too verbose
logging.level.org.springframework.security=INFO
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=alem.woubshet@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
management.health.mail.enabled=false
