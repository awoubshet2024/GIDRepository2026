services:
#  db:
#    container_name: my-postgres
#    image: postgres
#    restart: always
#    environment:
#      POSTGRES_USER: alem
#      POSTGRES_PASSWORD: Dekalb14
  db:
    container_name: my-postgres
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: alem
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      # This line saves your data to a persistent volume named 'postgres_data'
      - postgres_data:/var/lib/postgresql

#  app:
#    container_name: gia-app
#    build: .
#    ports:
#      - "8080:8080"
#    environment:
#      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/postgres
#      - SPRING_DATASOURCE_USERNAME=alem
#      - SPRING_DATASOURCE_PASSWORD=Dekalb14
#    depends_on:
#      - db
  app:
    container_name: gia-app
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres
      SPRING_DATASOURCE_USERNAME: alem
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}

      MAIL_PASSWORD: ${MAIL_PASSWORD}

#  pgadmin:
#    container_name: my-pgadmin
#    image: dpage/pgadmin4
#    environment:
#      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
#      PGADMIN_DEFAULT_PASSWORD: ${DB_PASSWORD}
#      PGADMIN_LISTEN_PORT: 80
  pgadmin:
    container_name: my-pgadmin
    image: dpage/pgadmin4
    environment:
        PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
        PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
        PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      - db

# Define the volume at the bottom of the file
volumes:
  postgres_data: