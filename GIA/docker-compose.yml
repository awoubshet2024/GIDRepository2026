services:
  db:
    container_name: my-postgres
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: alem
      POSTGRES_PASSWORD: Dekalb14
    ports:
      - "5432:5432"
  pgadmin:
    container_name: my-pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: Dekalb14
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      - db